version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: pip-mongodb
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: people-intelligence
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pip-backend
    ports:
      - '3030:3030'
    environment:
      NODE_ENV: development
      PORT: 3030
      MONGODB_URI: mongodb://admin:password@mongodb:27017/people-intelligence?authSource=admin
      FRONTEND_URL: http://localhost:4200
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production}
      JWT_REFRESH_EXPIRES_IN: 7d
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pip-frontend
    ports:
      - '4200:4200'
    environment:
      ANGULAR_API_URL: http://localhost:3030/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb-data:
