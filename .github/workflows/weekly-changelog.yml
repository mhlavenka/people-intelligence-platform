name: Weekly Changelog

on:
  schedule:
    - cron: '0 9 * * 2'   # Every Tuesday at 09:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Full history so git log --since works correctly

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install python-docx

      - name: Generate changelog
        run: python3 scripts/changelog/generate_changelog.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          FILE=$(ls docs/changelog_*.docx | sort | tail -1)
          git add "$FILE"
          if git diff --cached --quiet; then
            echo "No new changelog file to commit."
          else
            git commit -m "docs: weekly changelog $(date +%Y-%m-%d)"
            git push
          fi
